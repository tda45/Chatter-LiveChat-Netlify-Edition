<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatter | Premium</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="spam-overlay">SPAM MESAJ ATAMAZSIN!</div>

    <section id="login-screen" class="active">
        <div class="glass-card login-box">
            <h1 class="neon-text">CHATTER</h1>
            <p class="subtitle">NETLIFY EDITION</p>
            <div class="input-group">
                <input type="text" id="username-input" placeholder="Nick Seçin..." maxlength="15">
                <button id="join-btn">GİRİŞ</button>
            </div>
            <p id="error-msg" class="error-msg"></p>
        </div>
    </section>

    <section id="chat-screen">
        <div class="glass-card chat-container">
            <header>
                <div class="user-profile">
                    <div class="online-indicator"></div>
                    <span id="display-username">...</span>
                </div>
                <div class="brand">CHATTER v2</div>
            </header>
            <div id="chat-messages" class="messages-area"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Mesaj yaz..." autocomplete="off">
                <button id="send-btn">➤</button>
            </div>
        </div>
    </section>

    <script src="assets/js/script.js"></script>
</body>
</html>
